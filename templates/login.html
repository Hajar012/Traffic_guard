<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic Guard Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f1f5f9;
      font-family: system-ui;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 360px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }
    .login-box h2 {
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }
    .admin { background: #1d4ed8; }
    .authority { background: #16a34a; }
    .guest { background: #6b7280; }

    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Traffic Guard Login</h2>

    <form action="/login" method="POST">
      <button name="role" value="admin" class="login-btn admin">Login as Admin</button>
      <button name="role" value="authority" class="login-btn authority">Login as Authority</button>
      <button name="role" value="guest" class="login-btn guest">Guest Preview</button>
    </form>
  </div>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic Guard Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
    }

    .role-label {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      background: #1d4ed8;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Traffic Guard Login</h2>
    <p class="role-label">Logging in as: <strong>{{ role|capitalize }}</strong></p>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/login">
      <input type="hidden" name="role" value="{{ role }}">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Continue</button>
    </form>

  </div>

</body>
</html>
